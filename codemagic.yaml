workflows:
  ios-testflight:
    name: Kulan iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # Name this EXACTLY "KulanASC" when you add the App Store Connect API key
      # in Codemagic (Teams → Integrations → App Store Connect).
      app_store_connect: KulanASC
    environment:
      ios_signing:
        # Codemagic fetches/creates the distribution cert + App Store profile
        # automatically using the API key above.
        distribution_type: app_store
        bundle_identifier: com.kulan.messenger.native
      xcode: latest
      vars:
        BUNDLE_ID: "com.kulan.messenger.native"
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Set a unique build number (epoch seconds)
        script: |
          sed -i '' "s/CURRENT_PROJECT_VERSION: \"1\"/CURRENT_PROJECT_VERSION: \"$(date +%s)\"/" project.yml
      - name: Generate Xcode project
        script: xcodegen generate
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa --project "Kulan.xcodeproj" --scheme "Kulan"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
