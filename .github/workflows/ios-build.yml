name: iOS Build

# Manual only — so pushing code while developing a batch costs nothing.
# I run this compile-check once per batch (then the TestFlight build), to keep
# CI minutes (and your $15 budget) spent only when we mean to.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode (need iOS 26 SDK for .glassEffect etc.)
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n1)
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Kulan.xcodeproj -scheme Kulan

      # First milestone: compile for the simulator (no signing). Proves the whole
      # stack builds — SwiftUI + Firebase + libsodium + Crypto.swift — before we
      # add signing/TestFlight.
      - name: Build (simulator, no signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Kulan.xcodeproj \
            -scheme Kulan \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO
