name: TestFlight

# Manual trigger so we only ship to TestFlight when we mean to.
on:
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode (Apple requires the iOS 26 SDK for upload)
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n1)
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          printf '%s' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"
          echo "key bytes: $(wc -c < "$RUNNER_TEMP/AuthKey.p8")"

      - name: Import distribution certificate
        env:
          DIST_P12_BASE64: ${{ secrets.DIST_P12_BASE64 }}
          DIST_P12_PASSWORD: ${{ secrets.DIST_P12_PASSWORD }}
        run: |
          echo "$DIST_P12_BASE64" | openssl base64 -d -A > "$RUNNER_TEMP/dist.p12"
          KC="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "" "$KC"
          security import "$RUNNER_TEMP/dist.p12" -k "$KC" -P "$DIST_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KC"
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          echo "Identities:"; security find-identity -v -p codesigning "$KC"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages (so -showBuildSettings is fast)
        run: xcodebuild -resolvePackageDependencies -project Kulan.xcodeproj -scheme Kulan

      - name: Build & upload to TestFlight
        env:
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          BUILD_NUMBER: ${{ github.run_number }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "180"
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "6"
        run: fastlane beta
