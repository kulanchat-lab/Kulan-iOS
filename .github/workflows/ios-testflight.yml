name: TestFlight

# Manual trigger so we only ship to TestFlight when we mean to.
on:
  workflow_dispatch:

jobs:
  testflight:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_API_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          cp ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 "$RUNNER_TEMP/AuthKey.p8"
          echo "key bytes: $(wc -c < "$RUNNER_TEMP/AuthKey.p8")"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive (Release, automatic signing via API key)
        run: |
          set -o pipefail
          xcodebuild -project Kulan.xcodeproj -scheme Kulan -configuration Release \
            -archivePath "$RUNNER_TEMP/Kulan.xcarchive" archive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$ASC_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            -skipPackagePluginValidation -skipMacroValidation

      - name: Export IPA
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Kulan.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        run: |
          IPA=$(ls "$RUNNER_TEMP/export/"*.ipa | head -n1)
          echo "Uploading $IPA"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
