# XcodeGen spec — generates Kulan.xcodeproj on the CI runner (no Mac needed to author).
# Run: `xcodegen generate` inside native/
name: Kulan
options:
  bundleIdPrefix: com.kulan
  deploymentTarget:
    iOS: "26.0"   # iOS 26+ only — no legacy fallbacks; build with the latest APIs
  createIntermediateGroups: true

packages:
  # Prebuilt xcframeworks mirror (same version, same products) — downloads from GitHub
  # releases instead of Google's servers, which beats the SPM binary-download hang on CI
  # and skips the long Firebase source compile.
  Firebase:
    url: https://github.com/akaffenberger/firebase-ios-sdk-xcframeworks
    exactVersion: "11.15.0"
  Sodium:
    url: https://github.com/jedisct1/swift-sodium
    from: "0.9.1"
  WebRTC:
    url: https://github.com/stasel/WebRTC
    from: "120.0.0"
  # Group calls. LiveKit ships its own LK-prefixed WebRTC, so it coexists with stasel/WebRTC
  # (used for 1:1). Binary comes from GitHub releases — fine on this CI (like the Firebase mirror).
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift
    from: "2.0.0"

targets:
  Kulan:
    type: application
    platform: iOS
    sources:
      - path: Kulan
    info:
      path: Kulan/Info.plist
      properties:
        CFBundleDisplayName: Kulan
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "Kulan needs photo access so you can send pictures in chats."
        NSPhotoLibraryAddUsageDescription: "Kulan needs permission to save photos to your camera roll."
        NSCameraUsageDescription: "Kulan needs camera access so you can take photos in chats."
        NSMicrophoneUsageDescription: "Kulan needs microphone access so you can send voice messages."
        NSFaceIDUsageDescription: "Kulan uses Face ID to unlock the app."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.kulan.messenger
            CFBundleURLSchemes: [kulan]
        UIBackgroundModes: [voip, audio]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kulan.messenger.native
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.10"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Kulan/Kulan.entitlements
        OTHER_LDFLAGS: "$(inherited) -ObjC"
    dependencies:
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebaseFunctions
      - package: Sodium
        product: Sodium
      - package: WebRTC
        product: WebRTC
      - package: LiveKit
        product: LiveKit
